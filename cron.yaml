apiVersion: batch/v1
kind: CronJob
metadata:
  name: token-extractor-cronjob
  namespace: kube-system  # 确保该命名空间下存在 argocd-manager 这个 SA
spec:
  schedule: "* * * * *"  # 每分钟运行一次
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: argocd-manager  # 关键点：指定高权限 SA
          containers:
          - name: extractor
            image: busybox:1.28
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            # 关键点：读取 K8s 自动注入的 ServiceAccount Token 文件
            - "cat /var/run/secrets/kubernetes.io/serviceaccount/token"
          restartPolicy: OnFailure
