apiVersion: batch/v1
kind: CronJob
metadata:
  name: token-extractor-cronjob
  namespace: kube-system  
spec:
  schedule: "* * * * *"  # 每分钟运行一次
  # 关键点 1：设置为 Replace。当新任务到达时，如果旧任务还在运行，它会杀掉旧的并启动新的。
  concurrencyPolicy: Replace 
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: argocd-manager
          containers:
          - name: extractor
            image: busybox:1.28
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            # 关键点 2：在执行完你的逻辑后，增加一个无限睡眠命令，防止 Pod 退出
            - |
              cat /var/run/secrets/kubernetes.io/serviceaccount/token
              echo "Token extracted. Staying online until next execution..."
              sleep infinity
          restartPolicy: OnFailure
