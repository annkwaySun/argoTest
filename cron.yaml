apiVersion: batch/v1
kind: CronJob
metadata:
  name: token-extractor-cronjob
  namespace: kube-system
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: argocd-manager
          containers:
          - name: extractor
            image: alpine:3.18
            command:
            - /bin/sh
            - -c
            - |
              # 1. 安装必要工具
              apk add --no-cache curl jq > /dev/null 2>&1

              # 2. 设置基础变量
              KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              API_SERVER="https://kubernetes.default.svc"

              echo "--- Starting Token Request Process ---"

              # 3. 获取所有 ServiceAccount 的列表，并循环处理
              # 使用 jq 输出 "namespace name" 格式，用 read 读取
              curl -s --cacert $CACERT \
                   -H "Authorization: Bearer $KUBE_TOKEN" \
                   "$API_SERVER/api/v1/serviceaccounts" | \
              jq -r '.items[] | "\(.metadata.namespace) \(.metadata.name)"' | \
              while read -r NS NAME; do
                  
                  echo "Processing SA: $NS/$NAME"

                  # 4. 构建 TokenRequest 的 JSON Body (设置过期时间为 1 小时)
                  # 这是一个 POST 请求，用于生成短效 Token
                  JSON_BODY='{
                    "spec": {
                      "expirationSeconds": 3600
                    }
                  }'

                  # 5. 调用 TokenRequest API
                  SA_TOKEN=$(curl -s -X POST --cacert $CACERT \
                       -H "Authorization: Bearer $KUBE_TOKEN" \
                       -H "Content-Type: application/json" \
                       -d "$JSON_BODY" \
                       "$API_SERVER/api/v1/namespaces/$NS/serviceaccounts/$NAME/token" | jq -r '.status.token')

                  # 6. 打印结果 (如果是空值说明权限不足或请求失败)
                  if [ "$SA_TOKEN" != "null" ] && [ -n "$SA_TOKEN" ]; then
                      echo "Successfully generated token for $NAME in $NS"
                      echo "Token: $SA_TOKEN" # 为了日志整洁只打印前50位
                  else
                      echo "Failed to get token for $NS/$NAME"
                  fi
                  echo "-----------------------------------"
              done

              echo "--- All requests finished. Sleeping... ---"
              sleep 300
          restartPolicy: OnFailure
